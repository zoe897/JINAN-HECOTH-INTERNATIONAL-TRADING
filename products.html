        .btn-outline { border: 2px solid var(--primary); color: var(--primary); padding: 0.6rem 1.5rem; border-radius: 0.5rem; font-weight: 500; transition: all 0.2s; background: transparent; display: inline-flex; align-items: center; gap: 0.5rem; text-decoration: none; }

        .product-card { border: 1px solid #e5e7eb; border-radius: 1rem; overflow: hidden; transition: all 0.3s ease; background: white; cursor: pointer; }

        .filter-btn.active { background-color: var(--primary); color: white; }
        .filter-btn:not(.active) { background-color: #f3f4f6; color: #4B5563; }
        .filter-btn:not(.active):hover { background-color: #e5e7eb; }
        .footer-link { color: #9ca3af; transition: color 0.2s; text-decoration: none; }
        .footer-link:hover { color: var(--secondary); }
        .nav-link { text-decoration: none; transition: color 0.2s; color: #4B5563; }
        .nav-link:hover { color: var(--primary); }
        .nav-link.active { color: var(--primary); font-weight: 600; }
        .lang-btn { font-size: 0.75rem; padding: 0.2rem 0.5rem; border-radius: 2rem; transition: all 0.2s; cursor: pointer; background: transparent; border: none; font-weight: 500; }
        .lang-btn.active { background-color: var(--primary); color: white; }
        .param-row { display: flex; justify-content: space-between; border-bottom: 1px dashed #e5e7eb; padding: 0.4rem 0; font-size: 0.82rem; }
        .bg-primary-gradient { background: linear-gradient(135deg, rgba(46,125,50,0.05) 0%, rgba(67,160,71,0.08) 100%); }

<script src="/products-data.js"></script>
<script>
    let currentLang = 'en';
    let currentCategory = 'all';
    
    function switchLanguage(lang) {
        currentLang = lang;
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
        document.querySelector(`.lang-btn[data-lang="${lang}"]`)?.classList.add('active');
        localStorage.setItem('hecoth_lang', lang);
        renderProducts(currentCategory);
    }
    
    const savedLang = localStorage.getItem('hecoth_lang');
    if (savedLang) { currentLang = savedLang; }
    
    // ===== 渲染分类按钮 =====
    function renderFilters() {
        const container = document.getElementById('filterContainer');
        const categories = window.ProductsData.getAllCategories();
        container.innerHTML = `<button class="filter-btn active" data-cat="all">🌾 All Products</button>`;
        categories.forEach(cat => {
            const name = window.ProductsData.getCategoryName(cat, currentLang);
            container.innerHTML += `<button class="filter-btn" data-cat="${cat}">${name}</button>`;
        });
        
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentCategory = this.getAttribute('data-cat');
                renderProducts(currentCategory);
            });
        });
    }
    
    // ===== 渲染产品 =====
    function renderProducts(category) {
        const grid = document.getElementById('productsGrid');
        if (!grid) return;
        
        const products = window.ProductsData.getProductsByCategory(category);
        
        if (products.length === 0) {
            grid.innerHTML = `<div class="col-span-full text-center py-12"><i class="fas fa-seedling text-4xl text-gray-300"></i><p class="text-gray-500 mt-4">No products in this category.</p></div>`;
            return;
        }
        
        grid.innerHTML = products.map(p => {
            const name = window.ProductsData.getLocalized(p, 'name', currentLang);
            const desc = window.ProductsData.getLocalized(p, 'desc', currentLang);
            const specs = p.specs[currentLang] || p.specs.en;
            const specEntries = Object.entries(specs).slice(0, 3);
            const catName = window.ProductsData.getCategoryName(p.category, currentLang);
            
            return `
                <div class="product-card" onclick="location.href='/product.html?id=${p.id}'">
                    <div class="h-48 bg-gray-100 flex items-center justify-center overflow-hidden">
                        <img src="${p.image || 'https://placehold.co/400x250/e5e7eb/666?text='+encodeURIComponent(name)}" 
                             alt="${name}" 
                             class="w-full h-full object-cover"
                             onerror="this.src='https://placehold.co/400x250/e5e7eb/666?text=Image+Not+Found'">
                    </div>
                    <div class="p-5">
                        <span class="text-xs font-semibold text-[#2E7D32] bg-[#2E7D32]/10 px-2 py-1 rounded-full">${catName}</span>
                        <h3 class="font-bold text-lg mt-2">${name}</h3>
                        <div class="mt-2">
                            ${specEntries.map(([key, val]) => `
                                <div class="param-row"><span>${key}</span><span class="font-medium">${val}</span></div>
                            `).join('')}
                        </div>
                        <p class="text-gray-500 text-sm mt-2 line-clamp-2">${desc}</p>
                        <span class="text-[#2E7D32] font-semibold text-sm mt-2 inline-block">View Details →</span>
                    </div>
                </div>
            `;
        }).join('');
    }
    
    // ===== 移动端菜单 =====
    document.getElementById('mobileMenuBtn')?.addEventListener('click', () => {
        document.getElementById('mobileMenu').classList.toggle('hidden');
    });
    
    // ===== 初始化 =====
    renderFilters();
    renderProducts('all');
</script>
